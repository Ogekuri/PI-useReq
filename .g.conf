{
  "master": "master",
  "develop": "develop",
  "work": "work",
  "default_commit_module": "",
  "ver_rules": [
    {
      "pattern": "README.md",
      "regex": "\\s*\\((\\d+\\.\\d+\\.\\d+)\\)\\n"
    },
    {
      "pattern": "src/**/*.ts",
      "regex": "VERSION\\s*=\\s*[\"\\']?(\\d+\\.\\d+\\.\\d+)[\"\\']?"
    },
    {
      "pattern": "package.json",
      "regex": "\"version\"\\s*:\\s*\"(\\d+\\.\\d+\\.\\d+)\""
    }
  ]
}
