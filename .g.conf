{
  "master": "master",
  "develop": "develop",
  "work": "work",
  "default_commit_module": "",
  "ver_rules": [
    {
      "pattern": "README.md",
      "regex": "\\s*\\((\\d+\\.\\d+\\.\\d+)\\)\\n"
    },
    {
      "pattern": "scripts/**/*.sh",
      "regex": "VERSION:\\s*(\\d+\\.\\d+\\.\\d+)\\n"
    },
    {
      "pattern": "src/**/*.ts",
      "regex": "__version__\\s*=\\s*[\"\\']?(\\d+\\.\\d+\\.\\d+)[\"\\']?"
    },
    {
      "pattern": "package.json",
      "regex": "\\bversion\\s*=\\s*\"(\\d+\\.\\d+\\.\\d+)\""
    }
  ]
}
