name: Release (npm)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  check-release-context:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release-context.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag and master ancestry
        id: release-context
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not canonical semver; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin master
          if git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/master"; then
            echo "Tag ${GITHUB_REF_NAME} is on origin/master; continuing release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${GITHUB_REF_NAME} is not on origin/master; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    needs: check-release-context
    if: needs.check-release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare publishable manifest
        run: npm pkg delete private

      - name: Publish package to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-github-release:
    needs: [check-release-context, publish-npm]
    if: needs.check-release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "categories": [
               { "title": "## ⛰️ Features", "labels": ["new"] },
               { "title": "## 🏗️ Implementations", "labels": ["implement"] },
               { "title": "## 🐛 Bug Fixes", "labels": ["fix"] },
               { "title": "## 🚜 Changes", "labels": ["change"] },
               { "title": "## 🎯 Cover Requirements", "labels": ["cover"] },
               { "title": "## ✨ Refactor", "labels": ["refactor"] },
               { "title": "## 📚 Documentation", "labels": ["docs"] },
               { "title": "## 🎨 Styling", "labels": ["style"] },
               { "title": "## ◀️ Revert", "labels": ["revert"] },
               { "title": "## ⚙️ Miscellaneous Tasks", "labels": ["misc"] },
               { "title": "## 💬 Other", "labels": ["other"] },
               { "title": "## ❓ Unknown", "labels": ["unknown"] },
               { "title": "## 🚀 Release", "labels": ["release"] }
             ],
             "ignore_labels": [
                "release",
                "ignore"
             ],
             "transformers": [
              {
                "pattern": "^[^\\(:\\s]+(\\([^\\)]+\\))?!?:\\s+([\\S]+[\\s\\S]*)",
                "target": "$2 $1"
              }
             ],
             "sort": {
                "order": "ASC",
                "on_property": "mergedAt"
             },
             "template": "#{{CHANGELOG}}\n\n<details>\n<summary>Uncategorized</summary>\n\n#{{UNCATEGORIZED}}\n</details>\n\n**Full Changelog**: [#{{FROM_TAG}}...#{{TO_TAG}}](https://github.com/#{{OWNER}}/#{{REPO}}/compare/#{{FROM_TAG}}...#{{TO_TAG}})",
              "label_extractor": [
               {
                 "pattern": "^([^\\(:\\s]+)(\\([^\\)]+\\))?(!)?:\\s+([\\S]+[\\s\\S]*)",
                 "on_property": "title",
                 "target": "$1"
               }
             ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.event.repository.name }} ${{ github.ref_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
